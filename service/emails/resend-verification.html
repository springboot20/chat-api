<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Your Email</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f9f9f9;
        padding: 40px;
      }
      .container {
        max-width: 600px;
        margin: auto;
        background-color: #ffffff;
        padding: 30px;
        border-radius: 8px;
      }
      .email-header {
        background-color: #2d3748;
        padding: 30px;
        color: white;
        text-align: center;
      }
      .btn {
        display: inline-block;
        margin-top: 20px;
        background-color: #2b6cb0;
        color: white !important;
        padding: 12px 24px;
        text-decoration: none;
        border-radius: 5px;
      }
      .footer {
        margin-top: 40px;
        font-size: 12px;
        color: #888888;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="email-header">
        <h1>{{app}}</h1>
      </header>

      <h2>Hello {{name}},</h2>
      <p>
        You requested a new verification link. Click the button below to verify
        your email:
      </p>
      <a href="{{verificationUrl}}" class="btn">Verify Email</a>
      <p>If you didn’t request this, please ignore the email.</p>
      <footer class="footer">
        &copy; {{currentYear}} {{app}}. All rights reserved.
      </footer>
    </div>
  </body>
</html>
